name: Merge Gate

# Triggers when a label is added to a pull request.
# When the PM agent adds 'status:pm-approved', this workflow:
# 1. Verifies all required CI checks have passed
# 2. Signals the PM agent that it is safe to call the merge API

on:
  pull_request:
    types: [labeled]

jobs:
  merge-gate:
    name: Verify merge conditions
    # Only run when the pm-approved label is added
    if: github.event.label.name == 'status:pm-approved'
    runs-on: self-hosted

    steps:
      - name: Verify all CI checks passed
        id: check-ci
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // Get all check runs for the PR head commit
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            // Filter out this workflow itself and find any failures
            const failed = checkRuns.check_runs.filter(run =>
              run.name !== 'Verify merge conditions' &&
              run.status === 'completed' &&
              run.conclusion !== 'success' &&
              run.conclusion !== 'skipped'
            );

            const pending = checkRuns.check_runs.filter(run =>
              run.name !== 'Verify merge conditions' &&
              run.status !== 'completed'
            );

            if (pending.length > 0) {
              const names = pending.map(r => r.name).join(', ');
              core.setFailed(`Checks still pending: ${names}`);
              return;
            }

            if (failed.length > 0) {
              const names = failed.map(r => `${r.name} (${r.conclusion})`).join(', ');
              core.setFailed(`Failing checks prevent merge: ${names}`);
              return;
            }

            console.log('All CI checks passed. Merge gate open.');

      - name: Post merge-ready comment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '## Merge Gate: All conditions met',
                '',
                '- CI checks: passed',
                '- PM approval: `status:pm-approved` label present',
                '',
                'PM Agent: safe to call merge API.',
              ].join('\n'),
            });

      - name: Post merge-blocked comment
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // Remove the pm-approved label since conditions are not met
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: 'status:pm-approved',
              });
            } catch (e) {
              console.log('Could not remove label:', e.message);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '## Merge Gate: Blocked',
                '',
                'CI checks have not all passed. The `status:pm-approved` label has been removed.',
                '',
                'PM Agent: do not merge until CI passes and label is re-added.',
              ].join('\n'),
            });
