# ═════════════════════════════════════════════════════════════════════════════
# SeriesScraper — Docker Compose Configuration
# ═════════════════════════════════════════════════════════════════════════════
#
# THREAT MODEL NOTE:
# This application is designed for LOCAL-NETWORK USE ONLY.
# It MUST NOT be exposed to the public internet.
# Security measures implemented:
# - PostgreSQL binds only to loopback (127.0.0.1)
# - No TLS termination (assumes local network or reverse proxy)
# - No external auth (username/password from .env)
# - Forum credentials stored in environment variables
#
# For production deployment beyond localhost, additional hardening is required.
#
# ═════════════════════════════════════════════════════════════════════════════

services:

  # ─── SeriesScraper Application ────────────────────────────────────────────
  # Blazor Server application that scrapes forum content and cross-checks
  # against IMDB datasets. Requires PostgreSQL and access to IMDB data volume.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Bind to localhost only by default; override with APP_BIND_ADDRESS in .env
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${APP_ENV:-Production}
      # ASPNETCORE_URLS controlled via .env for flexibility
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      IMDB_DATA_PATH: ${IMDB_DATA_PATH:-/data/imdb}
    volumes:
      # IMDB datasets volume — 5-15 GB depending on dataset selection
      - imdb-datasets:${IMDB_DATA_PATH:-/data/imdb}
      # Application logs volume for Serilog output
      - app-logs:/app/logs
    healthcheck:
      # Health check endpoint at /healthz verifies DB connectivity
      # NOTE: /healthz endpoint implementation pending — depends on SeriesScraper.Web
      # project from PR #54. Health check will fail until endpoint is implemented.
      # See docs/infrastructure/HEALTHCHECK_IMPLEMENTATION.md for implementation guide.
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - seriescraper-network

  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  # PostgreSQL 16 with Alpine base image (pinned tag, never :latest).
  # Port binding restricted to loopback (127.0.0.1) for security.
  # Accessible only from host machine via localhost — not from LAN or 0.0.0.0.
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # SECURITY: Bind to loopback only — never exposed to LAN or 0.0.0.0
      # External port for local tooling (pgAdmin, DBeaver) from host machine
      - "127.0.0.1:${DB_PORT_EXTERNAL:-5432}:5432"
    healthcheck:
      # Use pg_isready with proper user and database from env vars
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - seriescraper-network

  # ─── Self-Hosted GitHub Actions Runner ────────────────────────────────────
  # Registers with GitHub and runs CI workflows locally.
  # SECURITY: Image pinned to specific version tag to prevent supply chain attacks
  # from floating tags. Version 2.320.0 is stable as of Q1 2026.
  # Update version periodically for security patches.
  # 
  # To upgrade: Check https://github.com/myoung34/docker-github-actions-runner/releases
  # 
  # GITHUB_RUNNER_TOKEN: from GitHub Settings > Actions > Runners > New runner
  # Tokens expire after 1 hour — re-generate if runner fails to register.
  github-runner:
    # Pinned to specific version tag (not :latest) for security and reproducibility
    image: myoung34/github-runner:2.320.0
    environment:
      REPO_URL: ${GITHUB_REPO_URL}
      RUNNER_TOKEN: ${GITHUB_RUNNER_TOKEN}
      RUNNER_NAME: ${RUNNER_NAME:-seriescraper-runner}
      RUNNER_WORKDIR: /tmp/runner/work
      RUNNER_SCOPE: repo
      LABELS: self-hosted
    volumes:
      # Docker socket access required for running containerized builds
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_work:/tmp/runner/work
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - seriescraper-network

# ─── Volumes ────────────────────────────────────────────────────────────────
# Persistent storage for application data
volumes:
  # PostgreSQL database files
  # Expected size: 5-15 GB depending on IMDB dataset selection and user data
  postgres_data:
    driver: local
  
  # IMDB dataset TSV files (downloaded and cached)
  # Expected size: 5-10 GB for core datasets (title.basics, title.episode, etc.)
  # May grow to 15 GB with full dataset including ratings, crew, and other metadata
  imdb-datasets:
    driver: local
  
  # Application logs (Serilog output)
  # Expected size: <1 GB with proper log rotation
  app-logs:
    driver: local
  
  # GitHub Actions runner working directory
  # Expected size: Variable based on build artifacts (typically <2 GB)
  runner_work:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  seriescraper-network:
    driver: bridge
